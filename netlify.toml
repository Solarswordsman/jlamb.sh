# Netlify build & deploy settings for jlamb.sh (a static Vite site).
# Docs: https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
	# Gate the deploy on lint + tests (the command-dispatcher suite), then build.
	# For faster deploys, change this to just "npm run build".
	command = "npm run lint && npm test && npm run build"
	publish = "dist"

[build.environment]
	# Vite 8 needs Node >= 20.19 / 22.12. Pin for reproducible CI builds.
	NODE_VERSION = "22"

# Single-page static site, no client-side router, so no SPA fallback redirect
# is needed.

# The self-hosted MesloLGS NF TTFs never change without a filename change, so
# let browsers cache them hard.
[[headers]]
	for = "/fonts/*"
	[headers.values]
		Cache-Control = "public, max-age=31536000, immutable"
